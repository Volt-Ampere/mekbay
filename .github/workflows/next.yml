name: CI/CD Next Release
run-name: Deploy MekBay to next.mekbay.com
on:
  push:
    branches:
      - next
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-deploy:
    name: Build and Upload
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0    # fetch full history so commit count is accurate. 
          ref: refs/heads/next
          # TODO: reimplement it with an API call to GitHub so we don't have to use depth: 0 in checkout

      - name: Checkout mm-data
        uses: actions/checkout@v5
        with:
          repository: MegaMek/mm-data
          path: mm-data
          fetch-depth: 1

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install NPM and Build Angular Project
        env:
          MM_DATA_PATH: mm-data
        run: |  
          npm ci
          npm run build:next

      - name: Get LFTP
        run: sudo apt-get install -y --no-install-recommends lftp

      - name: Configure LFTP
        run: mkdir ~/.lftp && echo "set ssl:verify-certificate false;" >> ~/.lftp/rc

      - name: Upload Folder
        run: |
          INDEX_CSR_PUT=""
          if [ -f ./dist/browser/index.csr.html ]; then
            INDEX_CSR_PUT="put -O ./mekbay_next/ ./dist/browser/index.csr.html;"
          fi

          lftp -c "set cmd:fail-exit yes;
          set ftp:list-options -a;
          set net:max-retries 3;
          set net:timeout 30;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror --parallel=20 -R --transfer-all --no-perms --verbose --exclude-glob index.html --exclude-glob index.csr.html --exclude-glob ngsw.json ./dist/browser/ ./mekbay_next/;
          put -O ./mekbay_next/ ./dist/browser/index.html;
          ${INDEX_CSR_PUT}
          put -O ./mekbay_next/ ./dist/browser/ngsw.json;"

      - name: Cleanup Old Build and Sprite Files
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_REMOTE_DIR: ./mekbay_next
          FTP_CLEANUP_RETENTION_DAYS: 5
        run: node scripts/cleanup-ftp-build-output.mjs
